version: "3"

vars:
  BINARY: agent-builder
  PACKAGE: ./cmd/agent-builder
  DIST: dist
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  LDFLAGS: -s -w -X agent-builder/internal/version.Version={{.VERSION}} -X agent-builder/internal/version.Date={{.DATE}}

tasks:
  default:
    desc: Format, lint, test, then build for the current platform
    deps: [fmt, lint, test]
    cmds:
      - task: build

  build:
    desc: Build the {{.BINARY}} binary for the current platform
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.DIST}}/{{.BINARY}}"
    cmds:
      - mkdir -p {{.DIST}}
      - go build -trimpath -ldflags="{{.LDFLAGS}}" -o {{.DIST}}/{{.BINARY}} {{.PACKAGE}}

  build-all:
    desc: Cross-compile {{.BINARY}} for windows/macOS/linux × arm64/amd64
    cmds:
      - cmd: |
          set -e
          mkdir -p {{.DIST}}
          for p in "darwin arm64" "darwin amd64" "linux arm64" "linux amd64" "windows arm64 .exe" "windows amd64 .exe"; do
            set -- $p
            os="$1"; arch="$2"; ext="${3:-}"
            echo "==> {{.BINARY}} $os/$arch"
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="{{.LDFLAGS}}" -o "{{.DIST}}/{{.BINARY}}-$os-$arch$ext" {{.PACKAGE}}
          done

  test:
    desc: Run all tests
    sources:
      - "**/*.go"
    cmds:
      - go test ./...

  test:race:
    desc: Run all tests with the race detector
    sources:
      - "**/*.go"
    cmds:
      - go test ./... -race -count=1

  cover:
    desc: Print merged coverage report (per function + total)
    cmds:
      - go test -coverpkg=./... -coverprofile={{.DIST}}/cover.out ./...
      - go tool cover -func={{.DIST}}/cover.out

  cover-html:
    desc: Generate an HTML coverage report and open it
    cmds:
      - go test -coverpkg=./... -coverprofile={{.DIST}}/cover.out ./...
      - go tool cover -html={{.DIST}}/cover.out

  fmt:
    desc: Format all Go code (go fmt)
    cmds:
      - go fmt ./...

  fmt-check:
    desc: Fail if any Go file is not formatted
    cmds:
      - cmd: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "These files need formatting:"
            echo "$out"
            exit 1
          fi

  vet:
    desc: Run go vet
    sources:
      - "**/*.go"
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    sources:
      - "**/*.go"
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Sync and verify module dependencies
    cmds:
      - go mod tidy
      - go mod verify

  check:
    desc: Full CI gate — fmt-check + vet + lint + tests with race detector
    cmds:
      - task: fmt-check
      - task: vet
      - task: lint
      - task: test:race

  release:
    desc: 'Create a version tag and push it (usage: task release -- v0.1.0)'
    deps: [check, build]
    preconditions:
      - sh: 'test -n "{{.CLI_ARGS}}"'
        msg: 'version tag required (e.g. task release -- v0.1.0)'
      - sh: 'git diff --quiet'
        msg: 'working tree has uncommitted changes'
    cmds:
      - git tag {{.CLI_ARGS}}
      - git push origin {{.CLI_ARGS}}
      - echo "Tagged and pushed {{.CLI_ARGS}}"

  install:
    desc: Install {{.BINARY}} into GOPATH/bin
    cmds:
      - go install {{.PACKAGE}}

  clean:
    desc: Remove the {{.DIST}} build directory
    cmds:
      - rm -rf {{.DIST}}
